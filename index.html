<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividade de Ciências – Revisão Prova Paulista – 6º Ano – WMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul:        #064e9b;
  --azul-medio:  #1665c0;
  --azul-claro:  #ddeeff;
  --azul-borda:  #90b8e8;
  --verde:       #1a7a4a;
  --verde-claro: #d4f5e2;
  --vermelho:    #c0392b;
  --verm-claro:  #fde8e8;
  --amarelo:     #f39c12;
  --cinza-bg:    #f0f5fc;
  --cinza-borda: #c8d8ec;
  --texto:       #0d1b2e;
  --branco:      #ffffff;
  --sombra-s:    0 2px 8px rgba(6,78,155,.10);
  --sombra-m:    0 4px 20px rgba(6,78,155,.14);
  --radius:      12px;
  --font-body:   'Nunito', sans-serif;
  --font-title:  'Merriweather', serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--cinza-bg);
  color: var(--texto);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

.topo-escola {
  background: var(--azul);
  color: white;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 3px 18px rgba(6,78,155,.35);
}
.topo-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 11px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.topo-logo {
  width: 42px; height: 42px;
  background: rgba(255,255,255,.18);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.topo-texto { flex: 1; min-width: 0; }
.topo-escola-nome {
  font-family: var(--font-title);
  font-size: clamp(0.78rem, 2.5vw, 1.0rem);
  font-weight: 900;
  letter-spacing: .5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topo-subtitulo {
  font-size: 0.7rem;
  opacity: .72;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-top: 1px;
}

.ficha-wrap {
  background: white;
  border-bottom: 3px solid var(--azul-claro);
  box-shadow: var(--sombra-s);
}
.ficha {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 20px 18px;
}

.ficha-turma {
  display: inline-block;
  margin-bottom: 10px;
}
.ficha-turma select {
  width: auto;
  min-width: 160px;
}

.ficha-linha1 {
  display: grid;
  grid-template-columns: 1fr 80px auto;
  gap: 10px;
  align-items: end;
  margin-bottom: 10px;
}
#inp-serie {
  width: auto;
  min-width: 90px;
  white-space: nowrap;
}
.ficha-linha2 {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 10px;
  align-items: end;
  margin-bottom: 14px;
}

.campo { display: flex; flex-direction: column; gap: 4px; }
.campo label {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--azul);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.campo select,
.campo input {
  padding: 8px 11px;
  border: 2px solid var(--cinza-borda);
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--texto);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: white;
  width: 100%;
}
.campo select:focus,
.campo input:focus {
  border-color: var(--azul-medio);
  box-shadow: 0 0 0 3px rgba(22,101,192,.15);
}
.campo input[readonly] {
  background: var(--cinza-bg);
  color: #555;
  cursor: default;
}

.ficha-titulo {
  text-align: center;
  padding: 10px 0 2px;
  border-top: 2px dashed var(--azul-claro);
}
.ficha-titulo h2 {
  font-family: var(--font-title);
  font-size: clamp(0.9rem, 3vw, 1.25rem);
  color: var(--azul);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.ficha-titulo p {
  font-size: 0.78rem;
  color: #666;
  margin-top: 3px;
}

.questoes-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 14px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.questao-card {
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--cinza-borda);
  box-shadow: var(--sombra-s);
  overflow: hidden;
  animation: fadeUp .4s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.questao-card:nth-child(1)  { animation-delay: .05s; }
.questao-card:nth-child(2)  { animation-delay: .10s; }
.questao-card:nth-child(3)  { animation-delay: .15s; }
.questao-card:nth-child(4)  { animation-delay: .20s; }
.questao-card:nth-child(5)  { animation-delay: .25s; }
.questao-card:nth-child(6)  { animation-delay: .30s; }
.questao-card:nth-child(7)  { animation-delay: .35s; }
.questao-card:nth-child(8)  { animation-delay: .40s; }
.questao-card:nth-child(9)  { animation-delay: .45s; }
.questao-card:nth-child(10) { animation-delay: .50s; }

.questao-header {
  background: linear-gradient(90deg, var(--azul) 0%, var(--azul-medio) 100%);
  color: white;
  padding: 9px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.questao-num {
  font-family: var(--font-title);
  font-size: 0.92rem;
  font-weight: 700;
}
.hab-tag {
  background: rgba(255,255,255,.18);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 0.70rem;
  letter-spacing: .5px;
}

.questao-body { padding: 16px 18px; }
.enunciado {
  font-size: 0.96rem;
  line-height: 1.65;
  margin-bottom: 14px;
  color: var(--texto);
}
.questao-img {
  display: block;
  max-width: 100%;
  width: auto;
  max-height: 280px;
  margin: 0 auto 16px;
  border-radius: 9px;
  box-shadow: 0 3px 12px rgba(0,0,0,.10);
  border: 1px solid #e0e8f4;
  object-fit: contain;
}

.alternativas { display: flex; flex-direction: column; gap: 8px; }
.alt-btn {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 14px;
  border: 2px solid var(--cinza-borda);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.91rem;
  color: var(--texto);
  text-align: left;
  width: 100%;
  transition: border-color .18s, background .18s, transform .12s;
  user-select: none;
}
.alt-btn:hover:not(.bloqueada) {
  border-color: var(--azul-medio);
  background: var(--azul-claro);
  transform: translateX(2px);
}
.alt-btn.selecionada {
  border-color: var(--verde);
  background: var(--verde);
  color: white;
  font-weight: 800;
}
.alt-btn.selecionada .letra-badge {
  background: rgba(255,255,255,.25);
  color: white;
}
.alt-btn.correta  { background: var(--verde-claro); border-color: var(--verde); }
.alt-btn.errada   { background: var(--verm-claro);  border-color: var(--vermelho); }
.alt-btn.gabarito-revelado { background: var(--verde-claro); border-color: var(--verde); opacity:.75; }
.alt-btn.bloqueada { cursor: default; transform: none; }

.letra-badge {
  min-width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--azul);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.82rem;
  flex-shrink: 0;
  transition: background .18s;
}
.alt-btn.correta  .letra-badge { background: var(--verde); }
.alt-btn.errada   .letra-badge { background: var(--vermelho); }
.alt-btn.gabarito-revelado .letra-badge { background: var(--verde); }

.feedback {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 9px;
  font-size: 0.84rem;
  line-height: 1.55;
  animation: slideIn .3s ease;
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(-5px); }
  to   { opacity:1; transform:translateY(0); }
}
.feedback.certa  { background: var(--verde-claro); border: 1.5px solid var(--verde);    color: #0a3d22; }
.feedback.errada { background: var(--verm-claro);  border: 1.5px solid var(--vermelho); color: #6b1010; }

.feedback > strong:first-child { display: block; margin-bottom: 4px; font-size: .87rem; }
.feedback strong.inline        { display: inline; }

.btn-finalizar-wrap {
  max-width: 860px;
  margin: 0 auto 50px;
  padding: 0 14px;
  display: none;
}
.btn-finalizar {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(90deg, var(--azul) 0%, var(--azul-medio) 100%);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 1.05rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: var(--sombra-m);
  transition: transform .2s, box-shadow .2s;
  letter-spacing: .3px;
}
.btn-finalizar:hover { transform: scale(1.02); box-shadow: 0 6px 28px rgba(6,78,155,.28); }
.btn-finalizar:disabled {
  opacity: .6; cursor: not-allowed; transform: none;
}

#tela-resultado {
  display: none;
  max-width: 640px;
  margin: 30px auto 60px;
  padding: 0 14px;
}
.resultado-card {
  background: white;
  border-radius: 18px;
  padding: 36px 30px;
  box-shadow: var(--sombra-m);
  text-align: center;
}
.resultado-emoji { font-size: 3rem; margin-bottom: 10px; }
.resultado-titulo {
  font-family: var(--font-title);
  font-size: 1.4rem;
  color: var(--azul);
  margin-bottom: 6px;
}
.resultado-aluno {
  font-size: 0.88rem;
  color: #555;
  margin-bottom: 18px;
}
.resultado-nota {
  font-size: 3.2rem;
  font-weight: 900;
  color: var(--azul);
  line-height: 1;
  margin-bottom: 8px;
}
.resultado-mensagem {
  font-size: 0.93rem;
  color: #444;
  margin-bottom: 24px;
  line-height: 1.5;
}
.resultado-email-status {
  font-size: 0.80rem;
  padding: 8px 14px;
  border-radius: 8px;
  background: var(--azul-claro);
  color: var(--azul);
  margin-bottom: 20px;
  display: none;
}

#toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #0d1b2e;
  color: white;
  padding: 11px 22px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .ficha-linha1 { grid-template-columns: 1fr 70px; }
  .ficha-linha1 .campo:first-child { grid-column: 1 / -1; }
  .ficha-linha2 { grid-template-columns: 1fr; }
  .questao-body { padding: 13px 13px; }
  .alt-btn { padding: 9px 11px; font-size: 0.87rem; }
  .resultado-nota { font-size: 2.6rem; }
}
@media (max-width: 380px) {
  .ficha-linha1 { grid-template-columns: 1fr; }
  .topo-escola-nome { font-size: 0.75rem; }
}
</style>
</head>

</div>

<div class="questoes-wrap" id="questoes-wrap"></div>

</div>

<div id="tela-resultado">

    <div class="resultado-email-status" id="res-email-status"></div>
  </div>
</div>

<div id="toast"></div>

var alunoAtual   = null;
var respostas    = {};
var finalizado   = false;
var switchCount  = 0;

document.addEventListener('visibilitychange', function() {
  if (!finalizado && alunoAtual && document.hidden) switchCount++;
});

(function() {
  var hoje = new Date();
  var y = hoje.getFullYear();
  var m = String(hoje.getMonth() + 1).padStart(2, '0');
  var d = String(hoje.getDate()).padStart(2, '0');
  document.getElementById('inp-data').value = y + '-' + m + '-' + d;
})();

function aoMudarTurma() {
  var turmaId = document.getElementById('sel-turma').value;
  var selAluno = document.getElementById('sel-aluno');
  selAluno.innerHTML = '<option value="">— Selecione seu nome —</option>';
  document.getElementById('inp-num').value   = '';
  document.getElementById('inp-serie').value = '';
  document.getElementById('inp-email').value = '';
  alunoAtual = null;
  document.getElementById('wrap-btn-finalizar').style.display = 'none';

  if (!turmaId || !TURMAS[turmaId]) return;

  TURMAS[turmaId].forEach(function(a) {
    var opt = document.createElement('option');
    opt.value = JSON.stringify(a);
    opt.textContent = a.num + '. ' + a.nome;
    selAluno.appendChild(opt);
  });
}

function aoSelecionarAluno() {
  var val = document.getElementById('sel-aluno').value;
  if (!val) {
    alunoAtual = null;
    document.getElementById('inp-num').value   = '';
    document.getElementById('inp-serie').value = '';
    document.getElementById('inp-email').value = '';
    document.getElementById('wrap-btn-finalizar').style.display = 'none';
    return;
  }
  alunoAtual = JSON.parse(val);
  var turma  = document.getElementById('sel-turma').value;

  document.getElementById('inp-num').value   = alunoAtual.num;
  document.getElementById('inp-serie').value = '6º Ano ' + turma.replace('6','');
  document.getElementById('inp-email').value = alunoAtual.email;
  document.getElementById('wrap-btn-finalizar').style.display = 'block';
}

function renderQuestoes() {
  var wrap = document.getElementById('questoes-wrap');
  wrap.innerHTML = '';

  QUESTOES.forEach(function(q, idx) {
    var card = document.createElement('div');
    card.className = 'questao-card';
    card.id = 'card-' + q.num;
    card.style.animationDelay = (idx * 0.05) + 's';

    var altsHtml = q.alts.map(function(a) {
      return '<button class="alt-btn" id="alt-' + q.num + '-' + a.l + '" onclick="responder(' + q.num + ',\'' + a.l + '\')">' +
             '<span class="letra-badge">' + a.l + '</span>' +
             '<span>' + a.t + '</span>' +
             '</button>';
    }).join('');

    card.innerHTML =
      '<div class="questao-header">' +
        '<span class="questao-num">Questão ' + q.num + '</span>' +
        '<span class="hab-tag">' + q.hab + '</span>' +
      '</div>' +
      '<div class="questao-body">' +
        '<p class="enunciado">' + q.enunciado + '</p>' +
        '<img src="' + q.imagem + '" class="questao-img" alt="Imagem questão ' + q.num + '" loading="lazy">' +
        '<div class="alternativas">' + altsHtml + '</div>' +
        '<div class="feedback" id="fb-' + q.num + '"></div>' +
      '</div>';

    wrap.appendChild(card);
  });
}

function responder(qNum, letra) {
  if (finalizado) return;
  respostas[qNum] = letra;

  var q = QUESTOES.find(function(x) { return x.num === qNum; });
  q.alts.forEach(function(a) {
    var btn = document.getElementById('alt-' + qNum + '-' + a.l);
    btn.classList.remove('selecionada');
  });
  document.getElementById('alt-' + qNum + '-' + letra).classList.add('selecionada');
}

function mostrarToast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, dur || 3000);
}

function finalizarAtividade() {
  var turma = document.getElementById('sel-turma').value;
  if (!turma) {
    mostrarToast('⚠️ Selecione a turma antes de enviar!');
    window.scrollTo({top: 0, behavior: 'smooth'});
    return;
  }

  if (!alunoAtual) {
    mostrarToast('⚠️ Selecione seu nome antes de enviar!');
    window.scrollTo({top: 0, behavior: 'smooth'});
    return;
  }

  if (!SCRIPT_URL || SCRIPT_URL === 'COLE_AQUI_A_URL_DO_WEB_APP') {
    mostrarToast('⚠️ URL do servidor não configurada. Contate o professor.', 5000);
    console.error('SCRIPT_URL não foi configurada.');
    return;
  }

  var naoRespondidas = QUESTOES.filter(function(q) { return !respostas[q.num]; });
  if (naoRespondidas.length > 0) {
    var nums = naoRespondidas.map(function(q) { return 'Q' + q.num; }).join(', ');
    mostrarToast('⚠️ Responda ainda: ' + nums, 4000);
    var primeiraCard = document.getElementById('card-' + naoRespondidas[0].num);
    if (primeiraCard) primeiraCard.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }

  finalizado = true;
  var btnFinalizar = document.getElementById('btn-finalizar');
  btnFinalizar.disabled = true;
  btnFinalizar.textContent = '⏳ Enviando...';

  var acertos = 0;
  QUESTOES.forEach(function(q) {
    var resp   = respostas[q.num];
    var acertou = resp === q.gabarito;
    if (acertou) acertos++;

    q.alts.forEach(function(a) {
      var btn = document.getElementById('alt-' + q.num + '-' + a.l);
      btn.classList.add('bloqueada');
      btn.classList.remove('selecionada');
      btn.onclick = null;

      if (a.l === q.gabarito) {
        btn.classList.add(resp === a.l ? 'correta' : 'gabarito-revelado');
      } else if (resp === a.l) {
        btn.classList.add('errada');
      }
    });

    var fb = document.getElementById('fb-' + q.num);
    fb.style.display = 'block';
    if (acertou) {
      fb.className = 'feedback certa';
      fb.innerHTML = '<strong>✅ Correto!</strong> ' + q.comentario;
    } else {
      fb.className = 'feedback errada';
      fb.innerHTML = '<strong>❌ Incorreto.</strong> A resposta correta é <strong class="inline">' + q.gabarito + '</strong>. ' + q.comentario;
    }
  });

  var nota    = Math.round((acertos / QUESTOES.length) * 10 * 10) / 10;
  var dataVal = document.getElementById('inp-data').value;
  var dataFmt = dataVal ? dataVal.split('-').reverse().join('/') : '';

  exibirResultado(acertos, nota);

  enviarParaScript({
    sheetName:     '6o' + turma.replace('6','') + ' respostas WMS',
    studentName:   alunoAtual.nome,
    studentNumber: alunoAtual.num,
    studentGrade:  '6º Ano ' + turma.replace('6',''),
    date:          dataFmt,
    studentEmail:  alunoAtual.email,
    q1:  respostas[21] || '',
    q2:  respostas[22] || '',
    q3:  respostas[23] || '',
    q4:  respostas[24] || '',
    q5:  respostas[25] || '',
    q6:  respostas[26] || '',
    q7:  respostas[27] || '',
    q8:  respostas[28] || '',
    q9:  respostas[29] || '',
    q10: respostas[30] || '',
    acertos:     acertos,
    nota:        nota,
    switchCount: switchCount
  });
}

function exibirResultado(acertos, nota) {
  var total = QUESTOES.length;
  var pct   = acertos / total;

  document.getElementById('res-aluno').textContent =
    'Aluno(a): ' + alunoAtual.nome + ' — ' + document.getElementById('inp-serie').value;
  document.getElementById('res-nota').textContent = acertos + ' / ' + total + ' — Nota: ' + nota;

  var emoji, msg;
  if (pct >= .9)      { emoji = '🏆'; msg = 'Excelente! Resultado fantástico!'; }
  else if (pct >= .7) { emoji = '🎉'; msg = 'Muito bom! Você está no caminho certo.'; }
  else if (pct >= .5) { emoji = '👍'; msg = 'Bom desempenho! Continue estudando para melhorar.'; }
  else                { emoji = '📚'; msg = 'Continue estudando! A revisão vai te ajudar na Prova Paulista.'; }

  document.getElementById('res-emoji').textContent    = emoji;
  document.getElementById('res-msg').textContent      = msg;

  document.getElementById('wrap-btn-finalizar').style.display = 'none';
  var telaRes = document.getElementById('tela-resultado');
  telaRes.style.display = 'block';
  telaRes.scrollIntoView({behavior: 'smooth'});
}

function enviarParaScript(payload) {
  var statusEl = document.getElementById('res-email-status');
  var btnFinal = document.getElementById('btn-finalizar');

  statusEl.style.display    = 'block';
  statusEl.style.background = '';
  statusEl.style.color      = '';
  statusEl.textContent      = '📤 Enviando resultados...';

  var json = JSON.stringify(payload);

  var b64;
  try {
    b64 = btoa(unescape(encodeURIComponent(json)));
  } catch(e) {
    statusEl.style.background = '#fde8e8';
    statusEl.style.color      = '#6b1010';
    statusEl.textContent      = '❌ Erro ao codificar dados. Contate o professor.';
    btnFinal.textContent      = '⛔ Enviado (erro local)';
    return;
  }

  confirmarViaJsonp(b64, statusEl, btnFinal, payload);
}

function confirmarViaJsonp(b64, statusEl, btnFinal, payload) {
  var cbName = 'cb_' + Date.now();
  var url    = SCRIPT_URL + '?callback=' + cbName + '&data=' + encodeURIComponent(b64);
  var done   = false;

  window[cbName] = function(resp) {
    done = true;
    delete window[cbName];
    var tag = document.getElementById('jsonp-' + cbName);
    if (tag) tag.remove();

    if (resp && resp.status === 'ok') {
      statusEl.style.background = '#d4f5e2';
      statusEl.style.color      = '#0a3d22';
      statusEl.textContent      = '✅ Resultado registrado! E-mail enviado para ' + payload.studentEmail;
      btnFinal.textContent      = '✅ Atividade enviada';
    } else {
      statusEl.style.background = '#fde8e8';
      statusEl.style.color      = '#6b1010';
      statusEl.textContent      = '⚠️ Erro no servidor. Contate o professor.';
      btnFinal.textContent      = '⛔ Envio concluído (erro no servidor)';
      console.error('Apps Script retornou:', resp);
    }
  };

  var tag   = document.createElement('script');
  tag.id    = 'jsonp-' + cbName;
  tag.src   = url;
  tag.onerror = function() {
    if (!done) {
      done = true;
      delete window[cbName];
      statusEl.style.background = '#fff3cd';
      statusEl.style.color      = '#856404';
      statusEl.textContent      = '⚠️ Envio realizado, mas não foi possível confirmar. Contate o professor.';
      btnFinal.textContent      = '⛔ Envio concluído';
      console.warn('JSONP onerror — possível bloqueio institucional SEDUC-SP.');
    }
  };
  document.head.appendChild(tag);

  setTimeout(function() {
    if (!done) {
      done = true;
      if (window[cbName]) delete window[cbName];
      statusEl.style.background = '#fff3cd';
      statusEl.style.color      = '#856404';
      statusEl.textContent      = '⏱️ Servidor demorou a responder. Contate o professor para confirmar.';
      btnFinal.textContent      = '⛔ Envio concluído (timeout)';
    }
  }, 25000);
}
